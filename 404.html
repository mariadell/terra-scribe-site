<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — TerraScribe</title>
  <meta name="description" content="The page you are looking for does not exist.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://terrascribe.app/">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .error-page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: linear-gradient(145deg, #1e5038 0%, var(--green-dark) 50%, var(--green-mid) 100%);
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .error-icon {
      font-size: 5rem;
      margin-bottom: 1.5rem;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,.3));
    }
    .error-code {
      font-size: clamp(5rem, 18vw, 10rem);
      font-weight: 900;
      line-height: 1;
      color: rgba(255,255,255,.12);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      letter-spacing: -0.05em;
      pointer-events: none;
      user-select: none;
    }
    .error-content {
      position: relative;
      z-index: 1;
      max-width: 480px;
    }
    .error-title {
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 800;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }
    .error-sub {
      color: rgba(255,255,255,.72);
      font-size: 1.0625rem;
      line-height: 1.65;
      margin-bottom: 2.5rem;
    }
    .error-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
    }
    .error-btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 1.75rem;
      background: var(--sun);
      color: var(--text);
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      min-height: 48px;
      transition: 200ms cubic-bezier(.4,0,.2,1);
    }
    .error-btn-home:hover {
      background: #f0bb20;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(244,196,48,.45);
    }
    .error-btn-es {
      display: inline-flex;
      align-items: center;
      padding: 0.875rem 1.75rem;
      border: 2px solid rgba(255,255,255,.4);
      color: #fff;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      min-height: 48px;
      transition: 200ms cubic-bezier(.4,0,.2,1);
    }
    .error-btn-es:hover {
      background: rgba(255,255,255,.1);
      border-color: rgba(255,255,255,.75);
    }
    .error-logo {
      position: absolute;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: .625rem;
      font-weight: 800;
      font-size: 1.25rem;
      color: #fff;
      text-decoration: none;
    }
    .error-logo img { width: 32px; height: 32px; object-fit: contain; }
  </style>
</head>
<body>

<div class="error-page">
  <a href="./" class="error-logo" aria-label="TerraScribe home">
    <img src="assets/images/terrascribe-logo.png" alt="" width="32" height="32">
    TerraScribe
  </a>

  <div class="error-code" aria-hidden="true">404</div>

  <div class="error-content">
    <div class="error-icon" role="img" aria-label="Lost field">🌾</div>
    <h1 class="error-title">This field wasn't found</h1>
    <p class="error-sub">
      The page you're looking for doesn't exist or has been moved.
      Let's get you back to the logbook.
    </p>

    <div class="error-actions">
      <a href="./" class="error-btn-home">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Back to home
      </a>
      <a href="es/" class="error-btn-es" hreflang="es">
        En español
      </a>
    </div>
  </div>
</div>

</body>
</html>
